# Docker stack for lesson: realtime location updates at scale (C# track).
#
# Working directory: 1-realtime-location-updates-at-scale/2-csharp/.docker
#
# Start stack:
#   cd 1-realtime-location-updates-at-scale/2-csharp/.docker && docker compose up -d --build
#
# Cleanup:
#   docker compose down -v
#
name: rtl-csharp

services:
  # ASP.NET Core 8 + StackExchange.Redis HTTP API — self-build, no cloud image.
  location-tracker:
    container_name: rtl-csharp-location-tracker
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "3017:3017"
    environment:
      - PORT=3017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HEARTBEAT_TTL_SEC=30
    networks:
      - rtl-csharp-network
    depends_on:
      - redis

  # Redis 7 — geohash-encoded sorted set holding driver positions.
  redis:
    image: redis:7-alpine
    container_name: rtl-csharp-redis
    ports:
      - "6379:6379"
    networks:
      - rtl-csharp-network

networks:
  rtl-csharp-network:
    name: rtl-csharp-network
