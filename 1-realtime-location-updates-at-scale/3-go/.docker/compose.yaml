# Docker stack for lesson: realtime location updates at scale (Go track).
#
# Working directory: 1-realtime-location-updates-at-scale/3-go/.docker
#
# Start stack:
#   cd 1-realtime-location-updates-at-scale/3-go/.docker && docker compose up -d --build
#
# Cleanup:
#   docker compose down -v
#
name: rtl-go

services:
  # Chi + go-redis/v9 HTTP API — lesson entrypoint (self-build, no cloud image).
  location-tracker:
    container_name: rtl-go-location-tracker
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "3017:3017"
    environment:
      - PORT=3017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HEARTBEAT_TTL_SEC=30
    networks:
      - rtl-go-network
    depends_on:
      - redis

  # Redis 7 — geohash-encoded sorted set holding driver positions.
  redis:
    image: redis:7-alpine
    container_name: rtl-go-redis
    ports:
      - "6379:6379"
    networks:
      - rtl-go-network

networks:
  rtl-go-network:
    name: rtl-go-network
